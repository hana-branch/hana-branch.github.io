<!DOCTYPE html>
<html>
  <body>
      <script type="text/javascript">
      function unescapeHtml(escaped_str) {
          var div = document.createElement('div');
          div.innerHTML = escaped_str;
          var child = div.childNodes[0];
          return child ? child.nodeValue : null;
      }

      function validateProtocol(url) {
          var parser = document.createElement('a');
          parser.href = url;
          var protocol = parser.protocol.toLowerCase();
          if (['javascript:', 'vbscript:', 'data:', 'ftp:', ':', ' '].indexOf(protocol) < 0) {
              return url;
          }
          return null;
      }

      function validate(url) {
          var unescaped_value = unescapeHtml(url);
          if (unescaped_value && validateProtocol(unescaped_value)) {
              return unescaped_value;
          }
          return '/';
      }
      var hasURI = false;
      var intervalExecuted = false;
      window.onload = function() {
          console.log("onload");
          console.log("hasURI : " + hasURI + " / intervalExecuted : " + intervalExecuted);
          document.getElementById("l").src = validate("paltalk://group/4413433?link_click_id=870433049124648778");
          
          window.setTimeout(function() {
              if (!hasURI) {
                  window.top.location = validate("https://www.paltalk.com/?_branch_match_id=870433049124648778");
              }
              intervalExecuted = true;
          }, 300);
      };

      window.onblur = function() {
          console.log("onblur");
          console.log("hasURI : " + hasURI + " / intervalExecuted : " + intervalExecuted);
          hasURI = true;
      };

      window.onfocus = function() {
          console.log("onfocus"); 
          console.log("hasURI : " + hasURI + " / intervalExecuted : " + intervalExecuted);
          if (hasURI) {
              window.top.location = validate("https://www.paltalk.com/?_branch_match_id=870433049124648778");
          } else if (intervalExecuted) {
              window.top.location = validate("https://www.paltalk.com/?_branch_match_id=870433049124648778");
          }
      };
      </script>
      <iframe id="l" width="1" height="1" style="visibility:hidden"></iframe>
  </body>
</html>
